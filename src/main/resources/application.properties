spring.application.name=travel_system

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/travel_system?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Redis
spring.data.redis.url=redis://localhost:6379/0

# JWT配置
jwt.secret=6f73b1e6f8578ad12f72b64a4d244d2b7848b6ef79ff64a94ed295303946b803
jwt.expiration=86400
jwt.algorithm=HS256
jwt.token-prefix=Bearer

# 微信小程序配置
wechat.appid=wx5548ad39874b253e
wechat.appsecret=5393c3da18a084f4b81908a1ca9f1521
wechat.login-url=https://api.weixin.qq.com/sns/jscode2session

# 日志配置
logging.level.root=info
logging.level.com.travel=debug
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/travel_system.log
logging.file.max-size=10MB
logging.file.max-history=7

# OSS配置
oss.endpoint=oss-cn-beijing.aliyuncs.com
oss.access-key-id=${ALIBABA_CLOUD_ACCESS_KEY_ID}
oss.access-key-secret=${ALIBABA_CLOUD_ACCESS_KEY_SECRET}
oss.bucket-name=self-travel-system
oss.domain=your-bucket-domain

# 文件上传配置
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

ai.api.url=	https://api.deepseek.com
ai.api.key=${DEEP_SEEK_API_KEY}
ai.api.model=deepseek-chat